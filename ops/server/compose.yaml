services:
  web:
    build:
      context: ./repos/areti-platform
      dockerfile: Dockerfile.web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      SIGNUP_ENABLED: ${SIGNUP_ENABLED}
      TZ: ${TZ:-Europe/Madrid}
    depends_on:
      - api
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - appnet

  api:
    build:
      context: ./repos/areti-platform
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 4000
      CORS_ORIGINS: ${CORS_ORIGINS}
      WEB_APP_URL: ${WEB_APP_URL}
      PASSKEY_RP_ID: ${PASSKEY_RP_ID}
      PASSKEY_RP_NAME: ${PASSKEY_RP_NAME:-Areti}
      PASSKEY_ORIGINS: ${PASSKEY_ORIGINS}
      ATARAXIA_DB_PATH: /app/data/sqlite/ataraxia.prod.db
      AVATAR_STORAGE_PATH: /app/data/uploads/avatar-images
      REFLECTION_STORAGE_PATH: /app/data/uploads/reflection-audio
      CHAT_PROVIDER_ORDER: ${CHAT_PROVIDER_ORDER:-openai}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      DEEPSEEK_CHAT_MODEL: ${DEEPSEEK_CHAT_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-resend}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SIGNUP_ENABLED: ${SIGNUP_ENABLED}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_STORE: ${RATE_LIMIT_STORE:-memory}
      REDIS_URL: ${REDIS_URL:-}
      RATE_LIMIT_REDIS_PREFIX: ${RATE_LIMIT_REDIS_PREFIX:-areti:ratelimit}
      RATE_LIMIT_TRUST_PROXY: ${RATE_LIMIT_TRUST_PROXY:-false}
      RATE_LIMIT_LOG_BLOCKS: ${RATE_LIMIT_LOG_BLOCKS:-true}
      RATE_LIMIT_ADMIN_MAX_ROWS: ${RATE_LIMIT_ADMIN_MAX_ROWS:-100}
      RATE_LIMIT_USE_DB_OVERRIDES: ${RATE_LIMIT_USE_DB_OVERRIDES:-false}
      RATE_LIMIT_POLICY_OVERRIDES_JSON: ${RATE_LIMIT_POLICY_OVERRIDES_JSON:-}
      AVATAR_IMAGE_MAX_BYTES: ${AVATAR_IMAGE_MAX_BYTES:-3145728}
      REFLECTION_AUDIO_MAX_BYTES: ${REFLECTION_AUDIO_MAX_BYTES:-10485760}
      TZ: ${TZ:-Europe/Madrid}
    command: >
      sh -lc '
        read_secret() {
          file="$$1";
          name="$$2";
          if [ -f "$$file" ]; then
            export "$$name=$$(cat "$$file")";
          fi
        }
        read_secret /run/secrets/openai_api_key OPENAI_API_KEY;
        read_secret /run/secrets/resend_api_key RESEND_API_KEY;
        read_secret /run/secrets/deepseek_api_key DEEPSEEK_API_KEY;
        read_secret /run/secrets/rate_limit_ip_hash_salt RATE_LIMIT_IP_HASH_SALT;
        exec npm run start:api'
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./data/sqlite:/app/data/sqlite
      - ./data/uploads:/app/data/uploads
    secrets:
      - openai_api_key
      - resend_api_key
      - deepseek_api_key
      - rate_limit_ip_hash_salt
    networks:
      - appnet

  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PRODUCT_HOST: ${PRODUCT_HOST}
      API_HOST: ${API_HOST}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
      TZ: ${TZ:-Europe/Madrid}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./config/caddy:/config
    depends_on:
      - web
      - api
    networks:
      - appnet

secrets:
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  resend_api_key:
    file: ./secrets/resend_api_key.txt
  deepseek_api_key:
    file: ./secrets/deepseek_api_key.txt
  rate_limit_ip_hash_salt:
    file: ./secrets/rate_limit_ip_hash_salt.txt

networks:
  appnet:
    driver: bridge
