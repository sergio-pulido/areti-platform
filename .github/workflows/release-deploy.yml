name: Release Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Git tag or ref to deploy"
        required: true
        type: string

concurrency:
  group: production-release
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}

jobs:
  validate-release:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run release CI pipeline
        run: npm run ci

  security-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  deploy-production:
    needs:
      - validate-release
      - security-gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_REF }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        env:
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$PROD_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy release on server
        env:
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
        run: |
          PORT="${PROD_SSH_PORT:-22}"
          ssh -p "$PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" /bin/bash <<EOF
          set -euo pipefail
          APP_DIR="${PROD_APP_DIR}"
          REPO_DIR="\$APP_DIR/repos/areti-platform"

          cd "\$REPO_DIR"
          git fetch origin --tags
          git checkout "${DEPLOY_REF}"

          ./ops/server/scripts/sync-layout.sh "\$APP_DIR"
          "\$APP_DIR/scripts/deploy-release.sh" "\$APP_DIR"
          EOF
